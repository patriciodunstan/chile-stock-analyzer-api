version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chile_stocks
      POSTGRES_USER: chile_stocks
      POSTGRES_PASSWORD: chile_stocks_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chile_stocks"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chile_stocks:chile_stocks_dev@db:5432/chile_stocks
      DEBUG: "false"
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
